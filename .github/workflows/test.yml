name: approvaltest01

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.KEY_ID }}
      AWS_DEFAULT_REGION: ca-central-1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Wait for Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GH_PAT }}
          approvers: anilsreeramula
          minimum-approvals: 1
          issue-title: "Approve Terraform Apply"
          issue-body: |
            Terraform plan has completed successfully.

            Please review the workflow logs.

            Reply with one of the following:
            - approve
            - approved
            - yes
            - lgtm

            To reject:
            - deny
            - denied
            - no

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
