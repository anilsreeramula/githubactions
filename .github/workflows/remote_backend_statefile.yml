name: remotebackend_statefile

on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.KEY_ID }}
      AWS_DEFAULT_REGION: ca-central-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # - name: Terraform Init (S3 Backend)
      #   run: |
      #     terraform init -reconfigure \
      #       -backend-config="bucket=conditional_approval" \
      #       -backend-config="key=terraform/state.tfstate" \
      #       -backend-config="region=ca-central-1"

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan


  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan

    # This enforces manual approval in GitHub "Environments"
    environment: production

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.KEY_ID }}
      AWS_DEFAULT_REGION: ca-central-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (S3 Backend)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=conditional_approval" \
            -backend-config="key=terraform/state.tfstate" \
            -backend-config="region=ca-central-1"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
